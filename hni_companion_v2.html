<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高净值客户智能陪伴系统 V2 — Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true, theme: 'dark', securityLevel: 'loose' });
    </script>
    <style>
        :root {
            --bg-deep: #0A0A0F;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a24;
            --gold: #C5A059;
            --gold-light: #e2cd8d;
            --gold-dim: #7a6438;
            --text-primary: #f0ece6;
            --text-secondary: #b0ada5;
            --text-muted: #706d65;
            --danger: #c0392b;
            --danger-dim: #8b2c20;
            --warning: #d4a017;
            --success: #27ae60;
            --border: rgba(197, 160, 89, 0.12);
            --border-active: rgba(197, 160, 89, 0.4);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --radius-sm: 12px;
            --font-display: 'Playfair Display', serif;
            --font-body: 'DM Sans', sans-serif;
            --glow-gold: 0 0 20px rgba(197, 160, 89, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(201, 169, 110, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(201, 169, 110, 0.02) 0%, transparent 50%);
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, rgba(201, 169, 110, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--bg-deep);
        }
        .header-logo h1 {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 1px;
        }
        .header-badge {
            background: var(--gold);
            color: var(--bg-deep);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Main Layout — single-column, centered */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 28px 20px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .main-container { padding: 20px; }
            .header { padding: 20px; }
        }

        /* Panels */
        .panel { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            border-color: var(--border-active);
            background: var(--bg-card-hover);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .card-title {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            color: var(--gold-light);
            letter-spacing: 0.5px;
        }
        .card-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Client Profile */
        .profile-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .profile-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .profile-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .profile-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .profile-value.highlight {
            color: var(--gold-light);
            font-weight: 700;
        }

        /* Client Tags */
        .client-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .client-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(201, 169, 110, 0.08);
            border: 1px solid rgba(201, 169, 110, 0.3);
            border-radius: 6px;
            font-size: 11px;
            color: var(--gold-light);
            white-space: nowrap;
        }

        /* Metrics */
        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .metric-row:last-child { border-bottom: none; }
        .metric-label { font-size: 13px; color: var(--text-secondary); }
        .metric-value { font-size: 14px; font-weight: 600; }
        .metric-value.positive { color: var(--success); }
        .metric-value.negative { color: var(--danger); }
        .metric-value.gold { color: var(--gold-light); }

        /* Progress Bar */
        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-fill.gold { background: linear-gradient(90deg, var(--gold-dim), var(--gold-light)); }
        .progress-fill.danger { background: linear-gradient(90deg, #8b0000, var(--danger)); }
        .progress-fill.warning { background: linear-gradient(90deg, #8a6d00, var(--warning)); }
        .progress-fill.success { background: linear-gradient(90deg, #1b5e20, var(--success)); }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Alert Tags */
        .alert-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            margin-bottom: 8px;
        }
        .alert-tag.high { background: rgba(192, 57, 43, 0.15); border-left: 3px solid var(--danger); }
        .alert-tag.medium { background: rgba(212, 160, 23, 0.12); border-left: 3px solid var(--warning); }
        .alert-tag.low { background: rgba(46, 125, 50, 0.12); border-left: 3px solid var(--success); }
        .alert-icon { font-size: 14px; flex-shrink: 0; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
        .alert-desc { color: var(--text-secondary); line-height: 1.4; }

        /* Legacy Score */
        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0 auto;
        }
        .score-inner {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-number {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--gold-light);
        }
        .score-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .score-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 12px;
        }
        .score-item {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }
        .score-check { color: var(--success); }
        .score-cross { color: var(--text-muted); }

        /* Legacy Block */
        .legacy-block {
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.08), rgba(201, 169, 110, 0.02));
            border: 1px solid var(--border-active);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 12px;
        }
        .legacy-block-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .legacy-block-title {
            font-family: var(--font-display);
            font-size: 14px;
            color: var(--gold-light);
        }
        .legacy-block-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .legacy-action {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .legacy-action:hover {
            background: var(--gold);
            color: var(--bg-deep);
        }

        /* Product Action Buttons */
        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .product-btn {
            display: inline-block;
            padding: 6px 16px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-secondary);
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-body);
        }
        .product-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border-color: var(--border-active);
        }
        .product-btn.primary {
            background: var(--gold);
            color: var(--bg-deep);
            border-color: var(--gold);
            font-weight: 600;
        }
        .product-btn.primary:hover {
            background: var(--gold-light);
            border-color: var(--gold-light);
        }
        .product-btn.dismiss {
            border-color: rgba(255,255,255,0.08);
            color: var(--text-muted);
            font-size: 10px;
        }
        .product-btn.dismiss:hover {
            background: rgba(192,57,43,0.1);
            color: var(--danger);
            border-color: var(--danger);
        }

        .product-card.dismissed {
            opacity: 0.3;
            pointer-events: none;
            text-decoration: line-through;
            text-decoration-color: var(--text-muted);
        }

        /* Currency Exposure */
        .currency-bar {
            display: flex;
            height: 24px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .currency-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: #000;
            transition: width 0.6s;
        }
        .currency-segment.usd { background: #c9a96e; }
        .currency-segment.hkd { background: #e8d5a3; }
        .currency-segment.sgd { background: #d4a574; }
        .currency-legend {
            display: flex;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }
        .currency-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .currency-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        .currency-dot.usd { background: #c9a96e; }
        .currency-dot.hkd { background: #e8d5a3; }
        .currency-dot.sgd { background: #d4a574; }

        /* Phone Mockup — Dark Gold Premium */
        .phone-mockup {
            position: sticky;
            top: 20px;
            width: 380px;
            max-width: 100%;
            margin: 0 auto;
            background: #111116;
            border-radius: 36px;
            border: 2px solid rgba(197, 160, 89, 0.12);
            padding: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.4), 0 0 80px rgba(197,160,89,0.04);
            overflow: hidden;
        }
        .phone-screen {
            background: #0A0A0F;
            border-radius: 28px;
            padding: 14px 12px;
            min-height: 560px;
            max-height: 640px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
        }
        .phone-screen::-webkit-scrollbar { width: 3px; }
        .phone-screen::-webkit-scrollbar-thumb { background: rgba(197,160,89,0.15); border-radius: 2px; }

        .chat-bubble {
            max-width: 94%;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.55;
            animation: fadeSlideUp 0.45s ease;
        }
        .chat-bubble.system {
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .chat-bubble.user {
            background: var(--gold-dim);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            text-align: right;
        }
        .chat-time {
            font-size: 10px;
            color: #555;
            text-align: center;
            margin: 10px 0;
        }

        /* Insight Cards — phone screen premium cards */
        .insight-card {
            background: #12121a;
            border: 1px solid rgba(197, 160, 89, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .insight-card-header {
            font-size: 15px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .insight-card-header .emoji { font-size: 16px; }
        .insight-big-number {
            font-family: var(--font-body);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .insight-big-number.up { color: var(--success); }
        .insight-big-number.down { color: var(--danger); }
        .insight-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: baseline;
        }
        .insight-ticker {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        .insight-ticker .up { color: var(--success); }
        .insight-ticker .down { color: var(--danger); }
        .insight-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .insight-divider {
            height: 1px;
            background: rgba(197, 160, 89, 0.08);
            margin: 14px 0;
        }
        .insight-action-card {
            background: #12121a;
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        /* Toggle button */
        .push-toggle-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            margin: 12px 0 4px;
            background: transparent;
            border: 1px solid rgba(197,160,89,0.25);
            border-radius: 20px;
            color: var(--gold);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-body);
        }
        .push-toggle-btn:hover {
            background: rgba(197,160,89,0.08);
            border-color: var(--gold-light);
        }

        /* Phone card styles */
        .phone-card {
            background: #12121a;
            border: 1px solid rgba(197, 160, 89, 0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .phone-card-header {
            font-size: 15px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .phone-card-label {
            font-size: 11px;
            color: var(--text-muted);
        }
        .phone-card-body {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .phone-action-btn {
            display: inline-block;
            padding: 8px 20px;
            background: var(--gold);
            color: #0A0A0F;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-body);
        }
        .phone-action-btn:hover {
            background: var(--gold-light);
        }
        .phone-action-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }
        .phone-expand-link {
            display: block;
            text-align: center;
            padding: 10px 0;
            margin-top: 12px;
            color: var(--gold);
            font-size: 13px;
            cursor: pointer;
            border: 1px solid rgba(197,160,89,0.25);
            border-radius: 20px;
            transition: all 0.3s;
        }
        .phone-expand-link:hover {
            background: rgba(197,160,89,0.08);
            border-color: var(--gold-light);
        }

        /* Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(197, 160, 89, 0.06); }
            50% { box-shadow: 0 0 30px rgba(197, 160, 89, 0.12); }
        }
        .chat-section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--gold-light);
            margin: 6px 0 4px 0;
        }
        .chat-item {
            font-size: 11px;
            color: #bbb;
            padding: 2px 0;
        }
        .chat-emoji { font-size: 14px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Action Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            border-radius: 20px;
            font-size: 13px;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: var(--gold);
            color: var(--bg-deep);
        }
        .btn.primary {
            background: var(--gold);
            color: var(--bg-deep);
            font-weight: 600;
        }
        .btn.primary:hover {
            background: var(--gold-light);
        }
        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn.danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        /* Product Card — H5 Card Style */
        .product-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 0;
            margin-bottom: 10px;
            transition: all 0.3s;
            overflow: hidden;
        }
        .product-card:hover { border-color: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
        .product-card.blocked {
            opacity: 0.4;
            border-color: var(--danger);
            background: rgba(192, 57, 43, 0.05);
            padding: 12px 14px;
        }
        .product-card-image {
            height: 80px;
            background: linear-gradient(135deg, var(--bg-panel), var(--bg-deep));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            position: relative;
            overflow: hidden;
        }
        .product-card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(212,175,55,0.08) 0%, transparent 60%);
        }
        .product-card-body {
            padding: 12px 14px;
        }
        .product-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
        }
        .product-reason {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .product-meta {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 10px;
            color: var(--text-muted);
        }
        .product-blocked-tag {
            font-size: 10px;
            color: var(--danger);
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 12px;
        }
        .tab {
            flex: 1;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
            border: none;
            background: transparent;
            font-family: var(--font-body);
        }
        .tab.active {
            background: var(--gold);
            color: var(--bg-deep);
            font-weight: 600;
        }

        /* Flow Diagram */
        .flow-steps {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .flow-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }
        .flow-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;

    const event = { category, action, label, timestamp: new Date().toISOString() };
    try {
        const events = JSON.parse(localStorage.getItem('analytics_events') || '[]');
        events.push(event);
        // Keep last 100 events
        if (events.length > 100) events.splice(0, events.length - 100);
        localStorage.setItem('analytics_events', JSON.stringify(events));
    } catch(e) {}
}

// ========== Core Logic (mirrors hni_core/) ==========

function convertToUSD(holdings, rates) {
    return holdings.map(h => {
        if (h.original_currency === 'USD') {
            h.market_value_usd = h.market_value_original;
        } else if (rates[h.original_currency]) {
            h.market_value_usd = h.market_value_original * rates[h.original_currency];
        } else {
            h.market_value_usd = h.market_value_original;
        }
        return h;
    });
}

function computeTotalValue(holdings) {
    return holdings.reduce((sum, h) => sum + h.market_value_usd, 0);
}

function computeWeights(holdings) {
    const total = computeTotalValue(holdings);
    holdings.forEach(h => { h.weight = total > 0 ? h.market_value_usd / total : 0; });
    return holdings;
}

function computeConcentration(holdings, topN = 5) {
    const sorted = [...holdings].sort((a, b) => b.market_value_usd - a.market_value_usd);
    const topValue = sorted.slice(0, topN).reduce((sum, h) => sum + h.market_value_usd, 0);
    const total = computeTotalValue(holdings);
    return total > 0 ? topValue / total : 0;
}

function computeVaR(holdings) {
    const volatility = { equity:0.20, bond:0.05, vc:0.35, pe:0.25, hedge_fund:0.15, cash:0.01, real_estate:0.12 };
    const total = computeTotalValue(holdings);
    const zScore = 1.645;
    let weightedVol = 0;
    holdings.forEach(h => {
        const vol = volatility[h.asset_class] || 0.15;
        weightedVol += h.weight * vol;
    });
    return zScore * weightedVol * total;
}

function computeLiquidity(holdings) {
    const liquid = holdings
        .filter(h => ['cash', 'bond'].includes(h.asset_class))
        .reduce((s, h) => s + h.market_value_usd, 0);
    const futureCalls = holdings
        .filter(h => ['vc', 'pe'].includes(h.asset_class))
        .reduce((s, h) => s + h.unfunded_commitment, 0) * 0.5;
    return futureCalls > 0 ? liquid / futureCalls : Infinity;
}

function computeAltRatio(holdings) {
    const alt = holdings
        .filter(h => ['vc', 'pe', 'hedge_fund', 'real_estate'].includes(h.asset_class))
        .reduce((s, h) => s + h.market_value_usd, 0);
    const total = computeTotalValue(holdings);
    return total > 0 ? alt / total : 0;
}

function computeCurrencyExposure(holdings) {
    const total = computeTotalValue(holdings);
    const exp = {};
    holdings.forEach(h => {
        exp[h.original_currency] = (exp[h.original_currency] || 0) + h.market_value_usd / total;
    });
    return exp;
}

function computeLegacyScore(profile, holdings) {
    let score = 0;
    const rules = {};

    // Age > 40: +20
    if (profile.age > 40) { score += 20; rules.age = true; }

    // Children > 0: +30
    if (profile.children_count > 0) { score += 30; rules.children = true; }

    // Lockup > 2 years: +20
    const today = new Date();
    const hasLongLockup = holdings.some(h => {
        if (!['vc', 'pe', 'hedge_fund', 'real_estate'].includes(h.asset_class)) return false;
        if (!h.locked_until) return false;
        const remaining = (new Date(h.locked_until) - today) / (365 * 86400000);
        return remaining > 2;
    });
    if (hasLongLockup) { score += 20; rules.lockup = true; }

    // Cross-border > 2: +30
    if (profile.cross_border_jurisdictions > 2) { score += 30; rules.crossBorder = true; }

    return { score: Math.min(score, 100), rules };
}

function shouldPromptLegacy(profile, altRatio) {
    if (profile.legacy_opt_out_until && new Date(profile.legacy_opt_out_until) >= new Date()) return false;
    if (profile.legacy_prompt_frequency > 0) return false;
    if (profile.total_assets_usd < 50_000_000) return false;
    if (altRatio < 0.30) return false;
    return true;
}

    return alerts;
}

function matchProducts(holdings, products, legacyScore, profile, totalAssets) {
    const matches = [];
    const concentration = computeConcentration(holdings);
    const liquidity = computeLiquidity(holdings);

    const isBlocked = (p) => {
        const blacklist = ['crypto', '加密货币', '数字资产', 'nft', 'token', '虚拟币', '挖矿', '区块链基金', 'defi'];
        const text = (p.name + p.type + p.reason).toLowerCase();
        return blacklist.some(kw => text.includes(kw.toLowerCase()));
    };

    // === Suitability Check ===
    const MAX_INVESTMENT_RATIO = 0.20; // 单产品投资 ≤ 总资产 20%
    const isSuitable = (p) => {
        // Asset size gate: minimum investment cannot exceed 20% of total assets
        if (totalAssets > 0 && p.min_investment > totalAssets * MAX_INVESTMENT_RATIO) {
            return false;
        }
        // Risk tolerance: aggressive clients accept all levels
        if (profile.risk_tolerance === 'aggressive') {
            if (p.risk_level === 'high') {
                p._highRiskWarning = true; // flag for UI warning
            }
            return true;
        }
        // Conservative: low risk only
        if (profile.risk_tolerance === 'conservative') {
            return p.risk_level === 'low';
        }
        // Moderate: low or medium
        if (profile.risk_tolerance === 'moderate') {
            return p.risk_level === 'low' || p.risk_level === 'medium';
        }
        return true;
    };

    const addProduct = (p) => {
        if (!matches.find(m => m.id === p.id) && isSuitable(p)) {
            matches.push(p);
        }
    };

    // Liquidity
    if (liquidity < 0.5) {
        products.filter(p => ['short_term_bond'].includes(p.type)).forEach(addProduct);
    }

    // Concentration
    if (concentration > 0.40) {
        products.filter(p => ['private_credit', 'real_estate', 'hedge_fund'].includes(p.type)).forEach(addProduct);
    }

    // Legacy
    if (legacyScore > 50) {
        products.filter(p => ['family_trust', 'insurance', 'estate_planning'].includes(p.type)).forEach(addProduct);
    }

    // Aggressive
    if (profile.risk_tolerance === 'aggressive' && matches.length < 3) {
        products.filter(p => ['pre_ipo', 'vc_co_invest'].includes(p.type)).forEach(addProduct);
    }

    return matches.filter(p => !isBlocked(p));
}

function analyzeHotTopics(holdings, news) {
    return news.map(n => {
        // 1. Direct related_symbols matching
        const directRelated = holdings.filter(h => n.related_symbols.includes(h.symbol));

        // 2. Enhanced mapping-based matching
        const mapRelated = [];
        for (const map of HOTSPOT_HOLDING_MAP) {
            const text = n.title + ' ' + n.summary;
            const keywordHit = map.keywords.some(kw => text.includes(kw));
            if (!keywordHit) continue;
            const h = holdings.find(hh => hh.symbol === map.ticker);
            if (h && !directRelated.find(d => d.symbol === h.symbol) && !mapRelated.find(m => m.symbol === h.symbol)) {
                mapRelated.push({ ...h, mapDirection: map.direction, mapNarrative: map.narrative });
            }
        }

        const allRelated = [...directRelated.map(h => ({ ...h, mapDirection: n.sentiment === 'positive' ? '利好' : (n.sentiment === 'negative' ? '利空' : '中性'), mapNarrative: '' })), ...mapRelated];

        if (allRelated.length === 0) return null;

        const confidence = Math.min(65 + allRelated.length * 12, 98);
        const direction = { positive: '利好', negative: '利空', neutral: '中性影响' }[n.sentiment] || '中性影响';
        const symbols = [...new Set(allRelated.map(r => r.symbol))];

        // Build the best narrative from mapping
        const bestNarrative = allRelated.find(r => r.mapNarrative);
        const narrative = bestNarrative ? bestNarrative.mapNarrative : n.summary;

        return {
            news: n,
            impact_direction: n.sentiment,
            confidence,
            related_holdings: symbols,
            narrative,
            mapDirection: bestNarrative ? bestNarrative.mapDirection : null,
            summary: `${direction}您持仓中的${symbols.join('、')}，置信度${confidence}%。${narrative}`,
        };
    }).filter(Boolean);
}

    const altValue = weighted.filter(h => ['vc', 'pe', 'hedge_fund', 'real_estate'].includes(h.asset_class))
        .reduce((s, h) => s + h.market_value_usd, 0);
    const altRatio = total > 0 ? altValue / total : 0;

    // ===== 币种敞口（全 USD）=====
    const currencyExp = { USD: 1.0 };

    // ===== 风险告警 =====
    const alerts = [];
    if (concentration > 0.60) {
        const topNames = sortedByValue.slice(0, 3).map(h => h.symbol).join('、');
        alerts.push({ level: 'high', category: 'concentration', title: '持仓集中度偏高', description: `前三大持仓（${topNames}）占总资产${(concentration*100).toFixed(0)}%，建议分散化配置。` });
    } else if (concentration > 0.40) {
        alerts.push({ level: 'medium', category: 'concentration', title: '持仓集中度关注', description: `前三大持仓占比${(concentration*100).toFixed(0)}%，关注单一板块波动风险。` });
    }
    if (var95 > 10_000_000) {
        alerts.push({ level: 'high', category: 'risk', title: '组合 VaR 超限', description: `当前 95% VaR 为 ${fmtM(var95)}，超过 $10M 阈值，建议评估下行风险敞口。` });
    } else if (var95 > 5_000_000) {
        alerts.push({ level: 'medium', category: 'risk', title: '组合 VaR 偏高', description: `当前 95% VaR 为 ${fmtM(var95)}，接近行业平均水平，持续关注。` });
    }
    if (liquidity !== Infinity && liquidity < 0.5) {
        const callAmount = vcUnfunded * 0.5;
        alerts.push({ level: 'high', category: 'liquidity', title: '流动性覆盖率严重不足', description: `未来 3 个月 VC 基金预计 call ${fmtM(callAmount)}，现金仅覆盖 ${(liquidity*100).toFixed(0)}%。已通知客户总监。` });
    } else if (liquidity !== Infinity && liquidity < 1.0) {
        alerts.push({ level: 'medium', category: 'liquidity', title: '流动性覆盖率偏低', description: `现金覆盖未来 VC call 的 ${(liquidity*100).toFixed(0)}%。建议关注未缴款承诺的时间安排。` });
    }
    if (altRatio > 0.50) {
        alerts.push({ level: 'medium', category: 'concentration', title: '另类资产占比过高', description: `VC/PE/对冲基金占比${(altRatio*100).toFixed(0)}%，流动性风险较高。` });
    }

    // ===== 热点-持仓联动 =====
    const hotTopics = hotspotData.map(h => ({
        news: {
            title: h.title,
            summary: h.summary,
            related_symbols: [h.relatedSymbol],
            sentiment: h.impactDirection,
            impact: h.confidence >= 80 ? 'high' : 'medium',
            timestamp: TODAY,
        },
        impact_direction: h.impactDirection,
        confidence: h.confidence,
        related_holdings: [h.relatedSymbol],
        summary: h.summary,
        narrative: h.summary,
        mapDirection: h.impactDirection === 'positive' ? '利好' : (h.impactDirection === 'negative' ? '利空' : '中性'),
    }));

    // ===== 产品匹配（优先级规则：流动性 < 集中度 < 传承）=====
    let product = null;
    if (liquidity !== Infinity && liquidity < 0.5) {
        product = { id: 'p5', name: '高流动性美元短债基金', reason: '应对 VC capital call，保持流动性' };
    } else if (concentration > 0.60) {
        product = { id: 'p1', name: '全球多元配置私募信贷基金', reason: '分散科技股集中度风险' };
    } else if (legacyScore > 70) {
        product = { id: 'p4', name: '新加坡离岸家族信托架构服务', reason: '跨境资产传承规划' };
    }

    // ===== 构建风险/机会项（按优先级：流动性预警 > 集中度风险 > VaR 提示 > 热点影响）=====
    const riskItems = [];

    if (liquidity !== Infinity && liquidity < 0.5) {
        riskItems.push({ priority: 1, icon: '🔴', text: `流动性预警：现金仅覆盖未来 VC call 的 ${(liquidity*100).toFixed(0)}%` });
    }
    if (concentration > 0.60) {
        const topNames = sortedByValue.slice(0, 3).map(h => h.symbol).join('、');
        riskItems.push({ priority: 2, icon: '⚠️', text: `集中度风险：前三大持仓（${topNames}）占比 ${(concentration*100).toFixed(0)}%，远超行业均值` });
    } else if (concentration > 0.40) {
        riskItems.push({ priority: 2, icon: '⚡', text: `集中度关注：前三大持仓占比 ${(concentration*100).toFixed(0)}%，需留意板块波动` });
    }
    if (var95 > 10_000_000) {
        riskItems.push({ priority: 3, icon: '📉', text: `VaR 提示：95% VaR ${fmtM(var95)}，超过 $10M 阈值，下行风险偏高` });
    } else if (var95 > 5_000_000) {
        riskItems.push({ priority: 3, icon: '📊', text: `VaR 提示：95% VaR ${fmtM(var95)}，接近行业平均，持续关注` });
    }
    hotspotData.forEach(h => {
        const direction = h.impactDirection === 'negative' ? '利空' : '利好';
        const icon = h.impactDirection === 'negative' ? '🔻' : '🟢';
        riskItems.push({ priority: 4, icon: icon, text: `${h.title}（${direction} ${h.relatedSymbol}，置信度 ${h.confidence}%）` });
    });
    riskItems.sort((a, b) => a.priority - b.priority);

    // ===== 最大涨跌个股 =====
    const equityMovers = weighted.filter(h => h.asset_class === 'equity')
        .sort((a, b) => Math.abs(b.change_percent) - Math.abs(a.change_percent));
    const topMover = equityMovers.length > 0 && Math.abs(equityMovers[0].change_percent) >= 0.3 ? equityMovers[0] : null;

    const cfg = loadPushConfig();

    // ===== 构建推送数据对象 =====
    const pushData = {
        dailyChangePct,
        dailyChange,
        total,
        topMover,
        riskItems,
        product,
        legacyScore,
        pushTime: cfg.pushTime || '09:00',
    };

    // ===== 高风险推送标记（console only）=====
    if (var95 > 10_000_000 || liquidity < 0.3) {
        console.log('[REVIEW] High-risk push flagged:',
            var95 > 10_000_000 ? 'VaR=' + fmtM(var95) + ' exceeds $10M' : '',
            liquidity < 0.3 ? 'Liquidity=' + fmtPct(liquidity) + ' below 30%' : '');
    }

    // ===== 渲染手机推送 =====
    renderPhonePush(pushData);

    // 存储当前推送状态
    currentPush = pushData;

    showToast('✅ 推送已生成');
    trackEvent('push', 'push_generated', 'V2');
    savePushHistory(dailyChangePct, product, riskItems, var95, concentration);
}

function renderPhonePush(data) {
    const { dailyChangePct, dailyChange, total, topMover, riskItems, product, legacyScore, pushTime } = data;
    const screen = document.getElementById('phoneScreen');

    // ---- 情感化问候语 ----
    function buildGreeting() {
        const hour = parseInt(pushTime.split(':')[0]);
        if (dailyChangePct > 0.5) {
            return '恭喜 David，您的组合今日跑赢大盘 🎉';
        } else if (dailyChangePct < -1) {
            return 'David，市场波动较大，但别担心，您的持仓基本面稳固。';
        }
        return 'David，您的组合今日小幅波动，以下是关注点。';
    }

    let html = '';

    // 时间戳 + 问候
    html += '<div class="chat-time">' + TODAY + ' ' + pushTime + '</div>';
    html += '<div class="chat-bubble system">' + buildGreeting() + '</div>';

    // ---- 卡片 1：今日表现 ----
    const pctCls = dailyChangePct >= 0 ? 'up' : 'down';
    const pctSign = dailyChangePct >= 0 ? '+' : '';
    html += '<div class="phone-card">';
    html += '<div class="phone-card-header">📊 今日表现</div>';
    html += '<div class="insight-big-number ' + pctCls + '">' + pctSign + dailyChangePct.toFixed(1) + '%</div>';
    html += '<div class="phone-card-label">较昨日 ' + (dailyChange >= 0 ? '+' : '') + '$' + fmtM(Math.abs(dailyChange)) + '</div>';
    if (topMover) {
        const sign = topMover.change_percent >= 0 ? '+' : '';
        const cls = topMover.change_percent >= 0 ? 'up' : 'down';
        html += '<div class="phone-card-body" style="margin-top:8px;">' + topMover.symbol + ' ' + (topMover.change_percent >= 0 ? '推动' : '拖累') + ' <span style="color:' + (topMover.change_percent >= 0 ? 'var(--success)' : 'var(--danger)') + ';">' + sign + topMover.change_percent.toFixed(1) + '%</span></div>';
    }
    html += '</div>';

    // ---- 卡片 2：关键风险/机会（按优先级：流动性预警 > 集中度风险 > VaR 提示 > 热点影响）----
    html += '<div class="phone-card">';
    html += '<div class="phone-card-header">⚡ 关键风险/机会</div>';
    if (riskItems.length > 0) {
        html += '<div class="phone-card-body">';
        riskItems.forEach(function(item) {
            html += '<div style="margin-bottom:4px;line-height:1.5;">' + item.icon + ' ' + item.text + '</div>';
        });
        html += '</div>';
    } else {
        html += '<div class="phone-card-body">今日暂无显著风险信号，组合运行平稳。</div>';
    }
    html += '</div>';

    // ---- 卡片 3：行动建议 ----
    html += '<div class="phone-card">';
    html += '<div class="phone-card-header">💡 行动建议</div>';
    if (product) {
        html += '<div class="phone-card-body">建议关注 <strong style="color:var(--gold-light);">' + product.name + '</strong>，' + product.reason + '</div>';
        html += '<div style="margin-top:10px;">';
        html += '<span class="phone-action-btn" onclick="createProductInquiry(\'' + product.id + '\',\'' + product.name.replace(/'/g, "\\'") + '\')">了解分散方案</span>';
        html += '</div>';
        if (legacyScore > 70) {
            html += '<div style="margin-top:8px;">';
            html += '<span class="phone-action-btn" style="background:transparent;color:var(--gold);border:1px solid var(--gold);" onclick="handleLegacyReply()">传承规划</span>';
            html += '</div>';
        }
    } else {
        html += '<div class="phone-card-body">保持现有配置，持续关注市场动态即可。</div>';
    }
    html += '</div>';

    // ---- 合规声明 ----
    html += '<div style="font-size:10px;color:var(--text-muted);text-align:center;margin:16px 0;padding:10px 8px;border-top:1px solid rgba(255,255,255,0.04);">';
    html += '投资涉及风险，过往业绩不代表未来表现。本内容仅供参考，不构成投资建议。';
    html += '</div>';

    screen.innerHTML = html;
    screen.scrollTop = 0;
}

function toggleFullContent() {
    var summary = document.getElementById('summaryView');
    var full = document.getElementById('fullContent');
    var isExpanded = full.style.display !== 'none';

    if (isExpanded) {
        // Collapse: show summary, hide full
        summary.style.display = 'block';
        full.style.display = 'none';
        var btn = summary.querySelector('.phone-expand-link');
        if (btn) btn.textContent = '展开详细报告';
    } else {
        // Expand: hide summary, show full
        summary.style.display = 'none';
        full.style.display = 'block';
        var btn = full.querySelector('.phone-expand-link');
        if (btn) btn.textContent = '收起详细报告';
        trackEvent('interaction', 'expand_content', 'full');
    }
    document.getElementById('phoneScreen').scrollTop = 0;
}

function createProductInquiry(productId, productName) {
    const screen = document.getElementById('phoneScreen');
    const ticketId = 'TICK-' + Date.now().toString(36).toUpperCase().slice(-6);
    const timestamp = new Date().toLocaleString('zh-CN');

    // 存储工单到 localStorage
    try {
        const orders = JSON.parse(localStorage.getItem('hni_workOrders') || '[]');
        orders.push({ ticketId, productId, productName, timestamp, status: '待处理' });
        if (orders.length > 50) orders.splice(0, orders.length - 50);
        localStorage.setItem('hni_workOrders', JSON.stringify(orders));
    } catch(e) {}

    // Add user message
    const userMsg = document.createElement('div');
    userMsg.className = 'chat-bubble user';
    userMsg.textContent = '我想了解「' + productName + '」';
    screen.appendChild(userMsg);

    // Add system reply — closed-loop notification
    const sysMsg = document.createElement('div');
    sysMsg.className = 'chat-bubble system';
    sysMsg.innerHTML = '✅ 已为您创建咨询工单（ID: <strong style="color:var(--gold-light);">' + ticketId + '</strong>），顾问将在 10 分钟内响应。';
    screen.appendChild(sysMsg);

    // Simulate backend notification
    console.log('[PUSH] 模拟发送顾问通知:', {
        to: 'advisor.david@hnipartners.com.hk',
        ticketId: ticketId,
        product: productName,
        timestamp: timestamp,
        channel: '飞书 + 邮件'
    });

    // Scroll to bottom
    screen.scrollTop = screen.scrollHeight;

    // Toast
    showToast('✅ 已为您创建咨询工单，顾问将在 10 分钟内响应。');
    trackEvent('conversion', 'product_inquiry', productId);
}

    const detail = PRODUCT_DETAILS[productId];
    if (!detail) { showToast('产品详情暂不可用'); return; }

    const riskClass = { low: '🟢 低风险', medium: '🟡 中等风险', high: '🔴 高风险' };
    const riskLabel = productCatalog.find(p => p.id === productId);
    const riskText = riskLabel ? (riskClass[riskLabel.risk_level] || riskLabel.risk_level) : '';

    document.getElementById('modalContent').innerHTML = `
        <button class="modal-close" onclick="closeProductModal()">&times;</button>
        <div class="modal-title">${productName}</div>
        <div>
            <span class="modal-tag">${riskText}</span>
            <span class="modal-tag">${detail.compliance_flag}</span>
        </div>
        <div class="modal-section">
            <h4>产品概述</h4>
            <p>${detail.overview}</p>
        </div>
        <div class="modal-section">
            <h4>核心亮点</h4>
            <ul>
                ${detail.highlights.map(h => '<li>' + h + '</li>').join('')}
            </ul>
        </div>
        <div class="modal-section">
            <h4>风险提示</h4>
            <p style="color:var(--warning);">${detail.risk_note}</p>
        </div>
        <div class="modal-actions">
            <button class="product-btn primary" onclick="closeProductModal();createProductInquiry('${productId}', '${productName.replace(/'/g, "\\'")}')">预约顾问</button>
            <button class="product-btn" onclick="window.open('mailto:advisor@hnipartners.com.hk?subject=咨询 ${productName.replace(/'/g, "\\'")}', '_blank')">📧 一键沟通</button>
        </div>
    `;

    document.getElementById('productModal').classList.add('show');
}

function closeProductModal() {
    document.getElementById('productModal').classList.remove('show');
}

function dismissProduct(productId) {
    const card = document.getElementById('product-' + productId);
    if (card) {
        card.classList.add('dismissed');
    }
    // Persist to localStorage
    let dismissedIds = [];
    try {
        const stored = localStorage.getItem('hni_dismissed_products');
        if (stored) dismissedIds = JSON.parse(stored);
    } catch(e) {}
    if (!dismissedIds.includes(productId)) {
        dismissedIds.push(productId);
        localStorage.setItem('hni_dismissed_products', JSON.stringify(dismissedIds));
    }
    showToast('已标记为不感兴趣');
}

function resetDismissedProducts() {
    localStorage.removeItem('hni_dismissed_products');
    generatePush();
    showToast('已重置所有忽略产品');
}

// ===== Push History =====
function savePushHistory(dailyChangePct, product, riskItems, var95, concentration) {
    const summary = [];
    const sign = dailyChangePct >= 0 ? '+' : '';
    summary.push('组合' + sign + dailyChangePct.toFixed(1) + '%');
    // 主要风险（取最高优先级的一条）
    if (riskItems && riskItems.length > 0) {
        summary.push(riskItems[0].text);
    }
    if (product) {
        summary.push('推荐' + product.name);
    }
    const entry = {
        date: TODAY,
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
        dailyChange: dailyChangePct,
        var95: var95,
        concentration: concentration,
        summary: summary.join('；'),
        product: product ? product.name : null,
    };

    let history = [];
    try {
        history = JSON.parse(localStorage.getItem('pushHistory') || '[]');
    } catch(e) {}
    history.unshift(entry);
    if (history.length > 5) history = history.slice(0, 5);
    localStorage.setItem('pushHistory', JSON.stringify(history));
}

function openHistory() {
    const listEl = document.getElementById('historyList');
    let history = [];
    try {
        history = JSON.parse(localStorage.getItem('pushHistory') || '[]');
    } catch(e) {}

    if (history.length === 0) {
        listEl.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px;">暂无历史记录</div>';
    } else {
        listEl.innerHTML = history.map((h, i) => {
            const pctCls = h.dailyChange >= 0 ? 'up' : 'down';
            const pctSign = h.dailyChange >= 0 ? '+' : '';
            return `
                <div style="padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,0.03);border-radius:8px;cursor:pointer;transition:all 0.2s;"
                     onmouseover="this.style.background='rgba(255,255,255,0.06)'"
                     onmouseout="this.style.background='rgba(255,255,255,0.03)'"
                     onclick="loadHistoryEntry(${i})">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-size:12px;color:var(--text-primary);">${h.date} ${h.time}</span>
                        <span style="font-size:13px;font-weight:600;color:${h.dailyChange >= 0 ? 'var(--success)' : 'var(--danger)'};">${pctSign}${h.dailyChange.toFixed(1)}%</span>
                    </div>
                    <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${h.summary}</div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('historyModal').classList.add('show');
}

function loadHistoryEntry(index) {
    let history = [];
    try {
        history = JSON.parse(localStorage.getItem('pushHistory') || '[]');
    } catch(e) {}
    if (index >= 0 && index < history.length) {
        const h = history[index];
        showToast('📜 历史推送：' + h.date + ' ' + h.time + ' — ' + h.summary);
    }
    closeHistory();
}

function closeHistory() {
    document.getElementById('historyModal').classList.remove('show');
}

function clearHistory() {
    localStorage.removeItem('pushHistory');
    document.getElementById('historyList').innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px;">暂无历史记录</div>';
    showToast('已清空推送历史');
}

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
